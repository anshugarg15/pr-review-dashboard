<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Review Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }
    .header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 600;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: #8b949e;
    }
    .refresh-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    .refresh-btn:hover { background: #2ea043; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auto-refresh-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #238636;
      animation: pulse-anim 2s infinite;
    }
    @keyframes pulse-anim {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px 20px;
      flex: 1;
    }
    .stat-card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .stat-card.slack-channel .value { color: #d29922; }
    .stat-card.slack-dm .value { color: #bc8cff; }
    .stat-card.total .value { color: #e6edf3; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }
    th {
      text-align: left;
      padding: 12px 16px;
      background: #1c2128;
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #30363d;
    }
    td {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid #21262d;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: #1c2128; }
    a {
      color: #58a6ff;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .source-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .source-badge.slack-channel { background: #3d2e00; color: #d29922; }
    .source-badge.slack-dm { background: #2d1f4e; color: #bc8cff; }
    .repo-name { color: #8b949e; font-size: 12px; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #8b949e;
    }
    .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: #e6edf3; }
    .errors {
      background: #3d1f1f;
      border: 1px solid #6e3630;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #f85149;
    }
    .loading {
      text-align: center;
      padding: 60px;
      color: #8b949e;
    }
    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .date-cell { white-space: nowrap; color: #8b949e; font-size: 13px; }
    .archive-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .archive-btn:hover { border-color: #f85149; color: #f85149; }
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filter-btn {
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }
    .filter-btn.active {
      background: #1f3a5f;
      color: #58a6ff;
      border-color: #58a6ff;
    }
    .filter-btn:hover { border-color: #58a6ff; }
  </style>
</head>
<body>
  <div class="header">
    <h1>PR Review Dashboard</h1>
    <div class="header-right">
      <div class="auto-refresh-indicator">
        <div class="pulse"></div>
        Auto-refresh every 5 min
      </div>
      <span id="lastUpdated">--</span>
      <button class="refresh-btn" id="refreshBtn" onclick="refresh()">Refresh Now</button>
    </div>
  </div>

  <div class="container">
    <div id="errors"></div>
    <div class="stats" id="stats"></div>
    <div class="filters" id="filters"></div>
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading PRs...</p>
      </div>
    </div>
  </div>

  <script>
    let allPRs = [];
    let currentFilter = "all";

    function sourceClass(source) {
      if (source === "Slack Channel") return "slack-channel";
      if (source === "Slack DM") return "slack-dm";
      return "";
    }

    function relativeTime(dateStr) {
      const now = new Date();
      const date = new Date(dateStr);
      const diffMs = now - date;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHr = Math.floor(diffMin / 60);
      const diffDay = Math.floor(diffHr / 24);
      if (diffMin < 1) return "just now";
      if (diffMin < 60) return `${diffMin}m ago`;
      if (diffHr < 24) return `${diffHr}h ago`;
      if (diffDay < 7) return `${diffDay}d ago`;
      return date.toLocaleDateString();
    }

    function renderStats(prs) {
      const channel = prs.filter(p => p.source === "Slack Channel").length;
      const dm = prs.filter(p => p.source === "Slack DM").length;

      document.getElementById("stats").innerHTML = `
        <div class="stat-card total"><div class="label">Total</div><div class="value">${prs.length}</div></div>
        <div class="stat-card slack-channel"><div class="label">Slack Channel</div><div class="value">${channel}</div></div>
        <div class="stat-card slack-dm"><div class="label">Slack DMs</div><div class="value">${dm}</div></div>
      `;
    }

    let archivedUrls = [];
    let showingArchived = false;

    function renderFilters() {
      const filters = ["all", "Slack Channel", "Slack DM"];
      let html = filters.map(f => {
        const cls = (!showingArchived && f === currentFilter) ? "filter-btn active" : "filter-btn";
        const label = f === "all" ? "All" : f;
        return `<button class="${cls}" onclick="setFilter('${f}')">${label}</button>`;
      }).join("");
      const archiveCls = showingArchived ? "filter-btn active" : "filter-btn";
      html += `<button class="${archiveCls}" onclick="toggleArchived()" style="margin-left:auto">Archived (${archivedUrls.length})</button>`;
      document.getElementById("filters").innerHTML = html;
    }

    function setFilter(filter) {
      showingArchived = false;
      currentFilter = filter;
      renderFilters();
      renderTable(allPRs);
    }

    async function toggleArchived() {
      showingArchived = !showingArchived;
      if (showingArchived) {
        const res = await fetch("/api/archive");
        archivedUrls = await res.json();
        renderFilters();
        renderArchivedTable();
      } else {
        renderFilters();
        renderTable(allPRs);
      }
    }

    function renderArchivedTable() {
      if (archivedUrls.length === 0) {
        document.getElementById("content").innerHTML = `
          <div class="empty-state">
            <h2>No archived PRs</h2>
            <p>PRs you archive will appear here.</p>
          </div>`;
        return;
      }
      const rows = archivedUrls.map(url => {
        const match = url.match(/github\.com\/([^/]+\/[^/]+)\/pull\/(\d+)/);
        const repo = match ? match[1] : "";
        const num = match ? match[2] : "";
        return `<tr>
          <td><a href="${url}" target="_blank">PR #${num}</a><div class="repo-name">${repo}</div></td>
          <td><button class="archive-btn" onclick="unarchivePR('${url}')">Restore</button></td>
        </tr>`;
      }).join("");
      document.getElementById("content").innerHTML = `
        <table>
          <thead><tr><th>Pull Request</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    async function unarchivePR(url) {
      await fetch("/api/archive", {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      archivedUrls = archivedUrls.filter(u => u !== url);
      renderFilters();
      renderArchivedTable();
    }

    function renderTable(prs) {
      if (showingArchived) return renderArchivedTable();
      const filtered = currentFilter === "all" ? prs : prs.filter(p => p.source === currentFilter);

      if (filtered.length === 0) {
        document.getElementById("content").innerHTML = `
          <div class="empty-state">
            <h2>No PRs awaiting review</h2>
            <p>You're all caught up! Check back later.</p>
          </div>`;
        return;
      }

      const rows = filtered.map(pr => `
        <tr>
          <td>
            <a href="${pr.url}" target="_blank">${escapeHtml(pr.title)}</a>
            <div class="repo-name">${escapeHtml(pr.repo)}</div>
          </td>
          <td>${escapeHtml(pr.author)}</td>
          <td><span class="source-badge ${sourceClass(pr.source)}">${pr.source}</span></td>
          <td class="date-cell" title="${new Date(pr.date).toLocaleString()}">${relativeTime(pr.date)}</td>
          <td><button class="archive-btn" onclick="archivePR('${pr.url}')">Archive</button></td>
        </tr>
      `).join("");

      document.getElementById("content").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Pull Request</th>
              <th>Author</th>
              <th>Source</th>
              <th>Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    async function fetchData() {
      const res = await fetch("/api/prs");
      const data = await res.json();
      return data;
    }

    async function render() {
      const [data, archiveRes] = await Promise.all([fetchData(), fetch("/api/archive")]);
      archivedUrls = await archiveRes.json();
      allPRs = data.prs || [];

      if (data.lastUpdated) {
        document.getElementById("lastUpdated").textContent =
          "Updated: " + relativeTime(data.lastUpdated);
      }

      if (data.errors && data.errors.length > 0) {
        document.getElementById("errors").innerHTML =
          `<div class="errors">${data.errors.map(e => escapeHtml(e)).join("<br>")}</div>`;
      } else {
        document.getElementById("errors").innerHTML = "";
      }

      renderStats(allPRs);
      renderFilters();
      renderTable(allPRs);
    }

    async function refresh() {
      const btn = document.getElementById("refreshBtn");
      btn.disabled = true;
      btn.textContent = "Refreshing...";
      try {
        await fetch("/api/refresh", { method: "POST" });
        await render();
      } finally {
        btn.disabled = false;
        btn.textContent = "Refresh Now";
      }
    }

    async function archivePR(url) {
      await fetch("/api/archive", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      allPRs = allPRs.filter(p => p.url !== url);
      renderStats(allPRs);
      renderTable(allPRs);
    }

    render();
    setInterval(render, 5 * 60 * 1000);
  </script>
</body>
</html>
